<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>♣ ♢ Old Maid ♡ ♠</title>
    <link rel="stylesheet" href="/css/baba.css" />
    <script type="text/javascript" src="/js/baba.js"></script>
</head>

<body>
    <h1> ♠ ♡ Old Maid ♣ ♢ </h1>
    <h4>青山学院大学<br> 社会情報学部社会情報学科<br> 山本優大</h4>
    <hr />
    <div id="setup">
        <p>プレイヤーの人数を選択してください</p>
        <select id="playerCount">
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
        </select><br>
        <div id="nameInputs"></div><br>
        <button onclick="startGame()">ゲーム開始</button>
    </div>

    <div id="status"></div>
    <div id="game">
        <h2 id="playerName"></h2>
        <div id="cards"></div>
        <button id = "drawButton" onclick="startDrawPhase()">次の人のカードを引く</button>
    </div>

    <div id="drawPhase">
        <h2 id="drawText"></h2>
        <div id="opponentCards"></div>
    </div>

    <div id="resultPhase">
        <h2 id="resultText"></h2>
        <div id="resultCards"></div>
        <button onclick="goToCheck()">次の人に渡す</button>
    </div>

    <div id="checkPhase" style="display:none;">
        <h2>次の人に渡しました</h2>
        <button onclick="finishTurn()">カードを表示する</button>
    </div>
</body>

</html>
