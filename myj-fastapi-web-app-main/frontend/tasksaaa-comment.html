<!DOCTYPE html>
<html lang="ja">

  <head>
  <meta charset="UTF-8">
  <title>コメント </title>

  <link rel="stylesheet" href="/css/general.css">
  <script type="text/javascript" src="/js/general.js"></script>
  <script type="text/javascript" src="/js/api.js"></script>

  <style>
  body {
    background-color: #121212;
    color: #ffffff;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    margin: 0;
    padding: 30px 20px;
  }

  h2 {
    text-align: center;
    color: #ffffff;
    margin-bottom: 30px;
  }

  #message-area {
    color: red;
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px;
  }

  form {
    max-width: 500px;
    margin: auto;
    background-color: #1e1e1e;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #cccccc;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #444;
    border-radius: 8px;
    background-color: #2a2a2a;
    color: white;
    font-size: 1rem;
  }

  button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background-color: #333;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.2s;
  }

  button:hover {
    background-color: #555;
    transform: scale(1.03);
  }

  .actions {
    text-align: center;
    margin-top: 20px;
  }

  .actions a {
    color: #80cbc4;
    text-decoration: none;
  }

  .actions a:hover {
    text-decoration: underline;
  }
</style>

</head>

<body>
    <div style="text-align: center; margin-bottom: 20px;">
<img src="aaa.png" alt="MITUKIロゴ" style="max-width:300px; height:auto;" />
</div>

  <h2>投稿にコメントする</h2>
<div id="message-area"></div>

<form id="comment-tasksaaa-form">

  <div id="task-input">
    <label for="commment">コメント</label>
    <input type="text" id="comment" name="comment" required>
    <br /><br />
  <button type="submit">更新</button>
  </form>
   <div class="actions">
        <a href="/indexaaa.html">一覧へ戻る</a>
      </div>
</div>
</body>
<script>

     if (!checkLogin()) {
    handleLoginError()
  } 
    const API_BASE_URL = "http://localhost:8000";
    const ARTICLE_PATH = "tasksaaa"; 

      const messageArea = document.getElementById("message-area");
      const form = document.getElementById("comment-tasksaaa-form");
      const commentInput = document.getElementById("comment");

    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get("taskId");

      const moveToTop = () => {
      setTimeout(() => {
        window.location.href = "/indexaaa.html";
      }, 1000);
    };
if (!taskId) {
      console.error("記事IDが指定されていません。");
      messageArea.innerHTML = `<p style="color:red;">記事IDが指定されていません。</p>`;
      moveToTop();
    } else {
      const COMMENT_ARTICLE_URL = `${API_BASE_URL}/${ARTICLE_PATH}/${taskId}`;

      fetch(COMMENT_ARTICLE_URL, {
        method: "GET",
        headers: {
          Authorization: `Bearer ${localStorage.getItem("token")}`,
        },
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error(
              `記事の取得に失敗しました。ステータス: ${response.status}`
            );
          }
          return response.json();
        })
       .then((task) => {
         comment.value = task.comment;
           })
        .catch((error) => {
          console.error("記事取得エラー:", error.message);
          messageArea.innerHTML = `<p style="color:red;">記事情報の取得に失敗</p>`;
          moveToTop();
        });
    }
    const putApi = (url, data) => {
      const response = fetch(url, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${localStorage.getItem("token")}`,
        },
        body: JSON.stringify(data),
      })

      .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTPエラー! ステータス: ${response.status}`);
          }
          return response.json();
        })
        .catch((error) => {
          console.error("エラー:", error);
          messageArea.innerHTML = `<p style="color:red;">コメントできませんでした。<br>${error.message}</p>`;
          throw error; // 例外を再スローする
        });
    };
    const handleFormSubmit = async (event) => {
      event.preventDefault();

      if (!taskId) {
        console.error("フォーム送信試行エラー: 記事IDがありません。");
        messageArea.innerHTML = `<p style="color:red;">記事IDが不明なため更新できません。</p>`;
        return;
      }
      const COMMENT_ARTICLE_URL = `${API_BASE_URL}/${ARTICLE_PATH}/${taskId}`;

      const comment = comment.value.trim();

      const data = {
        body: comment,
      };

       try {
        const response = await putApi(COMMENT_ARTICLE_URL, data);
        console.log("コメント成功:", response);
        window.location.href = `/tasksaaa-comment.html?taskId=${taskId}`;
      } catch (error) {
        console.error("フォーム送信エラー（コメント失敗）:", error.message);
        messageArea.innerHTML = `<p style="color:red;">コメントに失敗</p>`;
      }
    };

    form.addEventListener("submit", handleFormSubmit);
  </script>
